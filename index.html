<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanna's Space ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #131314;
            --chat-bg: #1e1e20;
            --text-color: #e3e3e3;
            --input-bg: #131314;
            --border-color: #444746;
            --btn-bg: #a8c7fa;
            --btn-text: #042f66;
            --user-msg: #374151;
            --transition-speed: 0.8s;
        }

        body.secret-mode {
            --bg-color: #1a1216;
            --chat-bg: #2d1b24;
            --text-color: #fcefed;
            --input-bg: #1a1216;
            --border-color: #5c3447;
            --btn-bg: #f3b0c3;
            --btn-text: #4a1525;
            --user-msg: #5c3447;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
        }

        header {
            padding: 10px 20px;
            background-color: var(--chat-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color var(--transition-speed) ease;
        }

        .title { font-weight: 600; font-size: 16px; letter-spacing: 0.5px; }

        #secret-toggle {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }
        #secret-toggle:hover { transform: scale(1.2); }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            transition: background-color var(--transition-speed) ease;
        }
        .user-message {
            background-color: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .ai-message {
            background-color: var(--chat-bg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        #input-container {
            padding: 20px;
            background-color: var(--chat-bg);
            display: flex;
            gap: 10px;
            transition: background-color var(--transition-speed) ease;
        }
        input {
            flex: 1;
            padding: 14px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: background-color var(--transition-speed) ease, border-color var(--transition-speed) ease;
        }
        button.send-btn {
            padding: 0 24px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
        }

        .mandala-loader-wrapper {
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
        }
        .mandala-loader {
            width: 40px;
            height: 40px;
            position: relative;
            animation: spinMandala 4s linear infinite;
        }
        .mandala-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #a8c7fa;
            top: 50%; left: 50%;
            transform-origin: 0 0;
            transition: background-color var(--transition-speed) ease;
        }
        body.secret-mode .mandala-dot { background-color: #f3b0c3; }

        .dot1 { transform: rotate(0deg) translate(-50%, -16px); }
        .dot2 { transform: rotate(45deg) translate(-50%, -16px); }
        .dot3 { transform: rotate(90deg) translate(-50%, -16px); }
        .dot4 { transform: rotate(135deg) translate(-50%, -16px); }
        .dot5 { transform: rotate(180deg) translate(-50%, -16px); }
        .dot6 { transform: rotate(225deg) translate(-50%, -16px); }
        .dot7 { transform: rotate(270deg) translate(-50%, -16px); }
        .dot8 { transform: rotate(315deg) translate(-50%, -16px); }
        
        .dot-center {
            width: 10px; height: 10px;
            background-color: #e8def8;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        body.secret-mode .dot-center { background-color: #fcefed; }

        .loader-text {
            font-style: italic;
            font-size: 14px;
            color: #8e918f;
        }

        @keyframes spinMandala {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <div class="title">Nanna's Safe Space ✨</div>
        <button id="secret-toggle" onclick="toggleSecretMode()" title="Unlock Secret Mode">❤️</button>
    </header>

    <div id="chat-container">
        <div class="message ai-message"><p>Hey Nanna ✨ Manoj built this cozy corner exclusively for you. Take a deep breath, leave the coding bugs outside, and tell me how your day is going!</p></div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Talk to me, Nanna..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
    function toggleSecretMode() {
        document.body.classList.toggle('secret-mode');
        const toggleBtn = document.getElementById('secret-toggle');
        if(document.body.classList.contains('secret-mode')) {
            toggleBtn.innerText = "🌸";
        } else {
            toggleBtn.innerText = "❤️";
        }
    }

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const messageText = inputField.value.trim();
        
        if (!messageText) return;

        appendMessage(messageText, 'user-message', false);
        inputField.value = '';

        const chatContainer = document.getElementById('chat-container');
        
        const loaderWrapper = document.createElement('div');
        loaderWrapper.className = 'mandala-loader-wrapper';
        loaderWrapper.innerHTML = `
            <div class="mandala-loader">
                <div class="mandala-dot dot-center"></div>
                <div class="mandala-dot dot1"></div>
                <div class="mandala-dot dot2"></div>
                <div class="mandala-dot dot3"></div>
                <div class="mandala-dot dot4"></div>
                <div class="mandala-dot dot5"></div>
                <div class="mandala-dot dot6"></div>
                <div class="mandala-dot dot7"></div>
                <div class="mandala-dot dot8"></div>
            </div>
            <div class="loader-text">Painting your thoughts...</div>
        `;
        
        chatContainer.appendChild(loaderWrapper);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: messageText })
            });

            const data = await response.json();
            loaderWrapper.remove();

            if (response.ok) {
                appendMessage(data.response, 'ai-message', true);
            } else {
                appendMessage("Oh no, something stalled on my end. Say that again, Nanna? ❤️", 'ai-message', false);
            }
        } catch (error) {
            loaderWrapper.remove();
            appendMessage("Unable to connect to our safe space right now.", 'ai-message', false);
        }
    }

    function appendMessage(text, className, isMarkdown) {
        const chatContainer = document.getElementById('chat-container');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${className}`;
        
        if (isMarkdown) {
            messageDiv.innerHTML = marked.parse(text);
        } else {
            messageDiv.innerText = text;
        }
        
        chatContainer.appendChild(messageDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
